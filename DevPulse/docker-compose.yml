version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: devpulse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./Backend/DevPulse.API
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__PostgresConnection: Host=postgres;Port=5432;Database=devpulse;Username=postgres;Password=postgres
      GitHub__Token: ${GITHUB_TOKEN}
    ports:
      - "7294:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_URL: https://api:7294
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
